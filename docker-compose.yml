# ==============================================================================
# ConfiDoc Backend — Docker Compose (Dev)
# ==============================================================================

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: confidoc-postgres
    environment:
      POSTGRES_USER: confidoc
      POSTGRES_PASSWORD: confidoc_dev_password
      POSTGRES_DB: confidoc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confidoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: confidoc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- MinIO (S3-compatible storage) ----------
  minio:
    image: minio/minio:latest
    container_name: confidoc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: confidoc_minio
      MINIO_ROOT_PASSWORD: confidoc_minio_secret
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- MinIO init (create bucket) ----------
  minio-init:
    image: minio/mc:latest
    container_name: confidoc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set confidoc http://minio:9000 confidoc_minio confidoc_minio_secret;
      mc mb confidoc/confidoc-documents --ignore-existing;
      mc anonymous set none confidoc/confidoc-documents;
      echo 'Bucket confidoc-documents created successfully';
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
